version: '3.7'
services:
  server:
    build: .
    ports:
      - '3000:3000'
    expose:
      - '3000'
    env_file:
      - .docker.env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api']
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  data-service:
    build:
      context: ./data-service
    ports:
      - '8000:8000'
    env_file:
      - .env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/db-health']
      interval: 30s
      timeout: 10s
      retries: 3
